name: ai-surveillance
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - flask
    - flask-cors
    - flask-socketio
    - cryptography
    - psutil
    - opencv-python==4.11.0.86
    - opencv-contrib-python==4.11.0.86
    - numpy==1.26.4
    - ultralytics
    - mediapipe==0.10.21
    - deepface
    - tf-keras==2.16.0
    - tensorflow==2.16.2
    - requests
    - pytest
    - flake8
    # NVIDIA Metropolis integration dependencies
    - tensorrt>=8.6
    - tritonclient[grpc]>=2.40
    - confluent-kafka>=2.3
    - paho-mqtt>=1.6
    - protobuf>=4.24
    - scipy>=1.11
    - filterpy>=1.4
    - hypothesis>=6.90
    - pybind11>=2.11
    - pynvml>=11.5
    - grpcio>=1.59
    - PyYAML>=6.0
